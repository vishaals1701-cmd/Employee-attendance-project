<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<h2>Employee Register</h2>

<form method="POST">
    <input name="employee_id" placeholder="Employee ID" required>
    <input name="employee_name" placeholder="Employee Name" required>
    <input name="phone" placeholder="Phone Number" required>
    <input name="email" placeholder="Email ID" required>
    <input name="domain" placeholder="Domain" required>
    <input name="username" placeholder="Username" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Register</button>
</form>

<a href="/login">Already have an account? Login</a>
</body>
</html>
